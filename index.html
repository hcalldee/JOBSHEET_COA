<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jobsheet Microsoft Word - COA UPTD BLK Kab. Kotabaru</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
    background:#f4f6f9;
    color:#333;
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#0d6efd;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h2{
    font-size:20px;
    margin-bottom:8px;
}

.card p{
    color:#666;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.btn{
    display:inline-block;
    background:#0d6efd;
    color:#fff;
    text-decoration:none;
    padding:10px 18px;
    border-radius:6px;
    transition:.2s;
}

.btn:hover{
    background:#0b5ed7;
}

footer{
    text-align:center;
    margin:40px 0;
    color:#777;
}
</style>

</head>
<body>

<div class="container">

<h1>📚 Jobsheet Microsoft Word</h1>

<p class="subtitle">
Pelatihan Computer Operator Assistant (COA)<br>
UPTD BLK Kab. Kotabaru
</p>

<div id="jobsheets"></div>

<footer>
© 2026 UPTD BLK Kab. Kotabaru
</footer>

</div>

<script>

fetch("config.json")
.then(res => res.json())
.then(data=>{

    const container=document.getElementById("jobsheets");

    data.jobsheets.forEach(js=>{

        if(!js.show) return;

        const card=document.createElement("div");
        card.className="card";

        let buttons="";

        js.files.forEach(file=>{

            buttons+=`
            <a
                class="btn"
                href="${file.file}"
                target="_blank"
            >
                📄 ${file.label}
            </a>
            `;

        });

        card.innerHTML=`
            <h2>${js.title}</h2>
            <p>${js.description}</p>

            <div class="buttons">
                ${buttons}
            </div>
        `;

        container.appendChild(card);

    });

})
.catch(err=>{

    document.getElementById("jobsheets").innerHTML=
    "<p>Jobsheet Belum Di Upload</p>";

    console.error(err);

});

</script>

</body>
</html>
